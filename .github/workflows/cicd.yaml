name: CICD Workflow
on: 
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build App
        run: npm run build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: react-app-build
          path: dist/

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: react-app-build
          path: dist/

      # - name: Run Tests
      #   run: npm test

      - name: Run Tests
        run: npm test -- --watchAll=false

      - name: Check if build file exists
        run: |
          test -f dist/index.html && echo "Build file exists" || (echo "Build file does not exist" && exit 1)

  deploy-to-azure:
    runs-on: ubuntu-latest
    needs: test
    env:
      AZURE_CONTAINER_REGISTRY: akilan
      RESOURCE_GROUP: 1-0cf9f306-playground-sandbox
      CONTAINER_APP_NAME: devops-horizon-container-app
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: react-build
          path: dist/
      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}


  